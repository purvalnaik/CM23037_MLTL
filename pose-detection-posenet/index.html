<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pose Detection</title>

  <!-- TensorFlow + PoseNet -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.20.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      font-size: 18px;
      margin: 10px;
    }

    #container {
      position: relative;
      width: 100%;
      max-width: 640px;
      margin: auto;
    }

    video, canvas {
      width: 100%;
      height: auto;
      position: absolute;
      top: 0;
      left: 0;
    }

  

    canvas {
      pointer-events: none;
    }
  </style>
</head>

<body>

<h1>Pose Detection (Mobile + PC)</h1>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
</div>

<script src="script.js"></script>

</body>
</html>
