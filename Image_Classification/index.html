<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Vision | MobileNet Classifier</title>

<!-- Stable TFJS versions -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.0"></script>

<style>
:root{
--primary:#6366f1;
--bg:#0f172a;
--card:#1e293b;
--text:#f8fafc;
}

body{
font-family:system-ui,sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:var(--card);
padding:2rem;
border-radius:20px;
width:90%;
max-width:500px;
text-align:center;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

h1{
margin-bottom:5px;
}

p{
color:#94a3b8;
margin-bottom:25px;
}

input[type=file]{
display:none;
}

.upload-btn{
background:var(--primary);
padding:12px 24px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
display:inline-block;
}

.upload-btn:hover{
background:#4f46e5;
}

#imagePreview{
width:100%;
border-radius:15px;
margin-top:20px;
display:none;
border:2px dashed #475569;
}

#status{
margin-top:15px;
color:#818cf8;
}

.prediction-card{
background:rgba(255,255,255,0.05);
margin-top:15px;
padding:15px;
border-radius:12px;
text-align:left;
display:none;
}

.prediction-item{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.prediction-item:last-child{
border-bottom:none;
}

.prob{
background:#22c55e;
padding:2px 8px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Vision</h1>
<p>Powered by MobileNet + TensorFlow.js</p>

<label for="imageUpload" class="upload-btn">
Upload Image
</label>

<input type="file" id="imageUpload" accept="image/*">

<img id="imagePreview">

<div id="status">Loading AI model...</div>

<div id="predictions" class="prediction-card"></div>

</div>

<script src="script.js"></script>

</body>
</html>
