<!DOCTYPE html>
<html>
<head>
<title>AI Sentiment Analyzer</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:12px;
    width:400px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{
    color:#333;
}

textarea{
    width:100%;
    height:100px;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    resize:none;
    font-size:14px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    background:#667eea;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#5563d6;
}

.result{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Sentiment Analyzer</h1>

<form method="POST">

<textarea name="text" placeholder="Type a sentence here..."></textarea>

<br>

<button type="submit">Analyze Sentiment</button>

</form>

<div class="result">

{% if sentiment %}

Sentiment: {{ sentiment }}

<br>

Confidence: {{ confidence }} %

{% endif %}

</div>

</div>

</body>
</html>
